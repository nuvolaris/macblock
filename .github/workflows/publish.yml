name: Publish MacBlock image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VERSION: "0.1.0"
  PRIMARY_IMAGE: ghcr.io/nuvolaris/macblock
  LEGACY_IMAGE: ghcr.io/nuvolaris/bestia-macblock

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.PRIMARY_IMAGE }}:${{ env.VERSION }}
            ${{ env.PRIMARY_IMAGE }}:latest
            ${{ env.LEGACY_IMAGE }}:${{ env.VERSION }}
            ${{ env.LEGACY_IMAGE }}:latest
